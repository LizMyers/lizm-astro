<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="lizm.dev — a portfolio designed for robots">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f7f4"/>
      <stop offset="100%" stop-color="#efece4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#paper)"/>
  <rect x="40" y="40" width="720" height="520" fill="none" stroke="#e5e3dd" stroke-width="1"/>

  <!-- Mono placard top -->
  <g font-family="'JetBrains Mono', monospace" font-size="13" letter-spacing="2" fill="#6b6b6b">
    <text x="64" y="92">EXHIBIT № 04 / 2026 / WEB / IN DEVELOPMENT</text>
  </g>

  <!-- Orange "now showing" dot -->
  <circle cx="736" cy="86" r="6" fill="#e8763a"/>

  <!-- Title -->
  <g font-family="'Newsreader', Georgia, serif" fill="#1a1a1a">
    <text x="64" y="270" font-size="92" font-weight="300" letter-spacing="-2">lizm.dev</text>
    <text x="64" y="335" font-size="28" font-style="italic" fill="#2b2b2b">A portfolio designed for robots,</text>
    <text x="64" y="370" font-size="28" font-style="italic" fill="#2b2b2b">readable by humans.</text>
  </g>

  <!-- Bottom rule + metadata -->
  <line x1="64" y1="490" x2="736" y2="490" stroke="#1b3a6f" stroke-width="1"/>
  <g font-family="'JetBrains Mono', monospace" font-size="12" letter-spacing="2" fill="#1b3a6f">
    <text x="64" y="518">ASTRO · STATIC HTML · &lt;DIALOG&gt; · &lt;DETAILS&gt; · LLMS.TXT</text>
  </g>
  <g font-family="'JetBrains Mono', monospace" font-size="12" letter-spacing="2" fill="#6b6b6b">
    <text x="64" y="538">CREAM · NAVY · ORANGE · NEWSREADER · INTER · JETBRAINS MONO</text>
  </g>
</svg>
